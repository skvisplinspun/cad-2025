<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ToDo Tracker</title>
</head>
<body>
<h1>ToDo List</h1>
<ul>
    <li th:each="task : ${tasks}">
        <span th:text="${task.description}"></span>
        <span th:text="${task.completed ? ' (Completed)' : ' (Pending)'}"></span>
        <a th:href="@{/deleteTask/{id}(id=${task.id})}">Delete</a>
        <form th:action="@{/updateTask/{id}(id=${task.id})}" method="post" style="display:inline;">
            <button type="submit" th:text="${task.completed ? 'Mark as Pending' : 'Mark as Completed'}"></button>
        </form>
    </li>
</ul>

<h2>Add New Task</h2>
<form th:action="@{/addTask}" method="post">
    <label for="description">Description:</label>
    <input type="text" id="description" name="description" required>
    <button type="submit">Add Task</button>
</form>
</body>
</html>
