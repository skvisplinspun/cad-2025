<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход в систему</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>
<body>
<div class="login-container">
    <h2 class="text-center mb-4">🔐 Вход в систему</h2>

    <!-- Сообщение об ошибке -->
    <div th:if="${param.error}" class="alert alert-danger">
        Неверный логин или пароль
    </div>

    <!-- Сообщение о выходе -->
    <div th:if="${param.logout}" class="alert alert-success">
        Вы успешно вышли из системы
    </div>

    <!-- Форма логина -->
    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label for="username" class="form-label">Логин</label>
            <input type="text" class="form-control" id="username" name="username"
                   placeholder="Введите логин" required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Пароль</label>
            <input type="password" class="form-control" id="password" name="password"
                   placeholder="Введите пароль" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">
            Войти
        </button>
    </form>

    <!-- Информация о тестовых пользователях -->
    <div class="mt-4">
        <h6>Тестовые пользователи:</h6>
        <ul>
            <li><strong>Логин:</strong> user | <strong>Пароль:</strong> password</li>
            <li><strong>Логин:</strong> moderator | <strong>Пароль:</strong> password</li>
            <li><strong>Логин:</strong> admin | <strong>Пароль:</strong> password</li>
        </ul>
    </div>
</div>
</body>
</html>
