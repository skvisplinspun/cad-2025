<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ToDo List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h1>📝 ToDo List</h1>

    <!-- Кнопка выхода -->
    <div class="mb-3">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-danger btn-sm">Выйти</button>
        </form>
    </div>

    <!-- Список задач -->
    <div th:if="${tasks.empty}">
        <p>Нет задач</p>
    </div>

    <div th:each="task : ${tasks}" class="card mb-3">
        <div class="card-body">
            <h5 th:text="${task.title}">Название</h5>
            <p th:text="${task.description}">Описание</p>
            <p>
                Статус:
                <span th:if="${task.completed}" class="badge bg-success">✓ Выполнено</span>
                <span th:unless="${task.completed}" class="badge bg-warning">⏳ В ожидании</span>
            </p>

            <div>
                <!-- Форма изменения статуса -->
                <form th:action="@{/updateTask/{id}(id=${task.id})}" method="post" style="display: inline;">
                    <button type="submit" class="btn btn-primary btn-sm">
                        <span th:text="${task.completed} ? 'Вернуть в работу' : 'Отметить выполненной'"></span>
                    </button>
                </form>

                <!-- Ссылка удаления -->
                <a th:href="@{/deleteTask/{id}(id=${task.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Удалить задачу?')">
                    Удалить
                </a>
            </div>
        </div>
    </div>

    <!-- Форма добавления задачи -->
    <h3>➕ Добавить задачу</h3>
    <form th:action="@{/addTask}" method="post">
        <div class="mb-3">
            <input type="text" name="title" class="form-control" placeholder="Название" required>
        </div>
        <div class="mb-3">
            <textarea name="description" class="form-control" placeholder="Описание"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Добавить</button>
    </form>
</div>
</body>
</html>
